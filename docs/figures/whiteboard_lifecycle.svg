<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <style>
    .box{fill:#071226;stroke:#60a5fa;stroke-width:1}
    .t{fill:#e8f8ff;font-family:Arial, sans-serif;font-size:13px}
    .arrow{stroke:#60a5fa;stroke-width:2;fill:none}
  </style>
  <rect x="40" y="30" width="180" height="60" rx="8" class="box" />
  <text x="60" y="68" class="t">Excalidraw Client</text>

  <rect x="360" y="30" width="180" height="60" rx="8" class="box" />
  <text x="390" y="68" class="t">Socket.IO Server</text>

  <rect x="680" y="30" width="180" height="60" rx="8" class="box" />
  <text x="720" y="68" class="t">Other Clients</text>

  <path d="M220 60 L360 60" class="arrow" marker-end="url(#a)" />
  <path d="M540 60 L680 60" class="arrow" marker-end="url(#a)" />

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#60a5fa" />
    </marker>
  </defs>

  <text x="260" y="100" class="t">emit update → server stores snapshot → rebroadcast</text>
</svg>